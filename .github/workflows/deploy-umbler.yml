name: Deploy blog to Umbler

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Eleventy
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.UMBLER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.UMBLER_PORT }}" "${{ secrets.UMBLER_HOST }}" >> ~/.ssh/known_hosts

      - name: Pack site
        run: tar -czf site.tar.gz -C public .

      - name: Upload artifact
        run: |
          scp -P "${{ secrets.UMBLER_PORT }}" site.tar.gz \
            "${{ secrets.UMBLER_USER }}@${{ secrets.UMBLER_HOST }}:~/site.tar.gz"

      - name: Publish on Umbler
        run: |
          ssh -p "${{ secrets.UMBLER_PORT }}" \
            "${{ secrets.UMBLER_USER }}@${{ secrets.UMBLER_HOST }}" \
            "mkdir -p ~/public && find ~/public -mindepth 1 -maxdepth 1 -exec rm -rf {} + && tar -xzf ~/site.tar.gz -C ~/public && rm ~/site.tar.gz"
