name: Deploy blog to Umbler

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Eleventy
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UMBLER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.UMBLER_PORT }}" "${{ secrets.UMBLER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy public/ to Umbler
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.UMBLER_PORT }}" \
            public/ \
            "${{ secrets.UMBLER_USER }}@${{ secrets.UMBLER_HOST }}:~/public/"
